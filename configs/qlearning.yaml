# Reinforcement Learning Configuration
agent:
  learning_rate: 0.1
  gamma: 0.95
  epsilon: 1.0
  epsilon_decay: 0.995
  epsilon_min: 0.01

environment:
  max_steps: 100
  tank_capacity: 100
  refill_amount: 30
  demand_range: [5, 25]

training:
  episodes: 1000
  save_path: "models/policy_v1.pkl"
  log_path: "results/training_logs.csv"

evaluation:
  test_episodes: 50
  plots_dir: "results/plots/"
  report_path: "results/evaluation_report.md"
